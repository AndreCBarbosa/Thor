<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paginação</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }


        .back {
            position: absolute;
            top: 40px;
            left: 40px;
            text-decoration: none;
            color: black;
        }

        div {
            position: absolute;
            left: 40vw;
            top: 100px
        }

        ul {
            border: 1px solid rgb(223, 223, 223);
            border-radius: 5px;
            display: inline-block;
            width: fit-content;
            margin: 30px;
        }

        li {
            list-style: none;
            float: left;
            padding: 12px 0px;
            width: 40px;
            text-align: center;
            align-items: center;
            color: rgb(54, 124, 255);
            font-size: small;
        }

        li:hover {
            background-color: rgb(200, 200, 200);
        }

        .separa {
            border-right: 1px solid rgb(223, 223, 223);
        }
    </style>
</head>

<body>

    <a href="../index" class="back">Voltar</a>

    <div>
        <ul>
            <li class="separa"><</li>
            <li class="separa">1</li>
            <li class="separa">2</li>
            <li class="separa">3</li>
            <li>></li>
        </ul>
    </div>
</body>

</html>
