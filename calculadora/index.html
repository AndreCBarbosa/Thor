<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <a href="../index" class="back">Voltar</a>
    
    <div class="shape">
        <div class="display">
            <div class="history"></div>
            <div class="value">0</div>
        </div>

        <div class="board">
            <div class="row">
                <button class="key" data-action="clear">AC</button>
                <button class="key" data-operator="percent">%</button>
                <button class="key" data-operator="changesignal">+/-</button>
                <button class="key" data-operator="division">/</button>
            </div>
            <div class="row">
                <button class="key" data-number="7">7</button>
                <button class="key" data-number="8">8</button>
                <button class="key" data-number="9">9</button>
                <button class="key" data-operator="multiplication">x</button>
            </div>
            <div class="row">
                <button class="key" data-number="4">4</button>
                <button class="key" data-number="5">5</button>
                <button class="key" data-number="6">6</button>
                <button class="key" data-operator="subtraction">-</button>
            </div>
            <div class="row">
                <button class="key" data-number="1">1</button>
                <button class="key" data-number="2">2</button>
                <button class="key" data-number="3">3</button>
                <button class="key" data-operator="addiction">+</button>
            </div>
            <div class="row">
                <button class="key" data-number="0">0</button>
                <button class="key" data-action="decimal">,</button>
                <button class="key last" data-operator="equal">=</button>
            </div>
        </div>

    </div>



    <script src="script.js"></script>
</body>

</html>
